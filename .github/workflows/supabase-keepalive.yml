name: Supabase Keep-Alive

on:
  schedule:
    # Ejecutar cada 5 días a las 08:00 UTC
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Permite lanzarlo manualmente desde GitHub si hace falta

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase health endpoint
        run: |
          echo "Haciendo ping a Supabase..."
          echo "URL: ${{ secrets.SUPABASE_URL }}"

          # Usamos el endpoint /auth/v1/health que siempre devuelve 200 si el proyecto está activo
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "HTTP status: $STATUS"
          echo "Response: $HTTP_BODY"

          # Cualquier respuesta HTTP válida (incluso errores 4xx) indica que el proyecto está vivo
          if [ -n "$STATUS" ] && [ "$STATUS" != "000" ]; then
            echo "✅ Ping exitoso (status $STATUS). El proyecto Supabase está activo."
          else
            echo "❌ No se pudo conectar. El proyecto puede estar pausado."
            exit 1
          fi
