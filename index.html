<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G ♥ J — Nuestra Historia</title>
  <meta name="description"
    content="La historia de Gema y Jorge. Un timeline de todos nuestros momentos juntos desde 2018.">
  <meta property="og:title" content="G ♥ J — Nuestra Historia">
  <meta property="og:description" content="Un timeline de todos nuestros momentos juntos desde 2018.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- ══ HEADER ══ -->
  <header id="main-header">
    <a class="header-logo" href="#" aria-label="Inicio">
      <span class="logo-g">G</span>
      <span class="logo-heart">♥</span>
      <span class="logo-j">J</span>
      <span class="logo-text">nuestra historia</span>
    </a>

    <div class="header-actions">
      <button id="btn-login-mobile" class="icon-btn" title="Iniciar sesión" aria-label="Iniciar sesión">🔑</button>
      <button id="btn-logout-mobile" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión" hidden>🚪</button>
      <button id="btn-theme" class="icon-btn btn-theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">☀️</button>
      <button id="btn-hamburger" class="icon-btn hamburger-btn" aria-label="Abrir menú" aria-expanded="false"
        aria-controls="mobile-menu">
        <span class="hamburger-icon">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>

    <div id="mobile-menu" class="header-right" aria-hidden="true">
      <input id="btn-search" type="search" placeholder="Buscar..." aria-label="Buscar eventos">

      <!-- Filtros desplegables -->
      <div class="header-filters">

        <!-- Persona -->
        <div class="filter-dropdown" id="dd-persona">
          <button class="filter-dd-trigger" id="dd-persona-btn" aria-expanded="false" aria-haspopup="listbox">
            <span id="dd-persona-label">👪 Persona</span>
            <svg class="dd-arrow" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round">
              <path d="M1 1l4 4 4-4" />
            </svg>
          </button>
          <div class="filter-dd-panel" id="dd-persona-panel" hidden role="listbox">
            <button class="filter-chip active" data-filter-person="all">Todos 👪</button>
            <button class="filter-chip" data-filter-person="juntos">❤️ Juntos</button>
            <button class="filter-chip" data-filter-person="jorge">👨 Jorge</button>
            <button class="filter-chip" data-filter-person="gema">👩 Gema</button>
          </div>
        </div>

        <!-- Categoría -->
        <div class="filter-dropdown" id="dd-cat">
          <button class="filter-dd-trigger" id="dd-cat-btn" aria-expanded="false" aria-haspopup="listbox">
            <span id="dd-cat-label">🗂️ Categoría</span>
            <svg class="dd-arrow" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round">
              <path d="M1 1l4 4 4-4" />
            </svg>
          </button>
          <div class="filter-dd-panel" id="dd-cat-panel" hidden role="listbox">
            <button class="filter-chip active" data-filter-cat="all">Todas</button>
            <button class="filter-chip" data-filter-cat="hito">🌟 Hitos</button>
            <button class="filter-chip" data-filter-cat="viaje">✈️ Viajes</button>
            <button class="filter-chip" data-filter-cat="estudios">📚 Estudios</button>
            <button class="filter-chip" data-filter-cat="trabajo">💼 Trabajo</button>
            <button class="filter-chip" data-filter-cat="vida">🌿 Vida</button>
            <button class="filter-chip" data-filter-cat="familia">👨‍👩‍👧 Familia</button>
          </div>
        </div>

        <!-- Año -->
        <div class="filter-dropdown" id="dd-year">
          <button class="filter-dd-trigger" id="dd-year-btn" aria-expanded="false" aria-haspopup="listbox">
            <span id="dd-year-label">📅 Año</span>
            <svg class="dd-arrow" viewBox="0 0 10 6" width="10" height="6" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round">
              <path d="M1 1l4 4 4-4" />
            </svg>
          </button>
          <div class="filter-dd-panel" id="dd-year-panel" hidden role="listbox">
            <div id="year-pills" role="group" aria-label="Filtrar por año"></div>
          </div>
        </div>

      </div>

      <div class="view-toggle" role="group" aria-label="Vista del timeline">
        <button id="btn-vertical" class="toggle-btn active" title="Vista vertical">Vertical</button>
        <button id="btn-horizontal" class="toggle-btn" title="Vista horizontal">Horizontal</button>
      </div>

      <div class="header-right-actions">
        <button id="btn-login-desktop" class="icon-btn theme-desktop" title="Iniciar sesión" aria-label="Iniciar sesión">🔑</button>
        <button id="btn-logout-desktop" class="icon-btn theme-desktop" title="Cerrar sesión" aria-label="Cerrar sesión" hidden>🚪</button>
        <button id="btn-theme-desktop" class="icon-btn btn-theme-toggle theme-desktop" title="Cambiar tema" aria-label="Cambiar tema">☀️</button>
        <button id="btn-add-event" class="btn-primary" aria-label="Añadir evento">+ Añadir</button>
        <div style="display:flex;gap:.4rem">
          <button id="btn-export" class="icon-btn" title="Exportar JSON" aria-label="Exportar datos">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </button>
          <label class="icon-btn" title="Importar JSON" aria-label="Importar datos">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <input id="btn-import-file" type="file" accept=".json" style="display:none">
          </label>
        </div>
      </div>
    </div>
  </header>


  <!-- ══ TIMELINE ══ -->
  <main id="timeline-container" class="timeline-vertical" aria-label="Timeline de eventos"></main>

  <!-- ══ FAB mobile ══ -->
  <button id="fab-add" aria-label="Añadir evento">+</button>

  <!-- ══ BACK TO TOP ══ -->
  <button id="btn-back-top" aria-label="Volver arriba" title="Volver arriba">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round" width="20" height="20">
      <polyline points="18 15 12 9 6 15" />
    </svg>
  </button>

  <!-- ══ DETAIL MODAL ══ -->
  <div id="modal-detail" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="detail-title">Evento</h2>
        <button class="modal-close" id="modal-detail-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <p id="detail-date" style="font-size:.85rem;color:var(--text2);margin-bottom:.75rem"></p>
        <div class="detail-info">
          <span id="detail-person" class="detail-badge"></span>
          <span id="detail-cat" class="detail-badge" style="background:var(--bg2);color:var(--text2)"></span>
        </div>
        <p id="detail-desc"></p>
        <div id="detail-gallery" class="detail-gallery"></div>
        <div class="detail-actions">
          <button id="detail-btn-edit" class="btn-edit">Editar</button>
          <button id="detail-btn-delete" class="btn-delete">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ FORM MODAL ══ -->
  <div id="modal-form" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="form-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="form-modal-title">Nuevo evento</h2>
        <button class="modal-close" id="modal-form-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <form id="form-event" novalidate>
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="f-year">Año *</label>
              <input id="f-year" class="form-input form-input--no-spin" type="number" min="2018" max="2099" placeholder="2024" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="f-month">Mes *</label>
              <select id="f-month" class="form-input" required>
                <option value="">— Mes —</option>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="f-person">Protagonista *</label>
              <select id="f-person" class="form-input" required>
                <option value="juntos">Juntos</option>
                <option value="jorge">Jorge</option>
                <option value="gema">Gema</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="f-category">Categoría</label>
              <select id="f-category" class="form-input">
                <option value="hito">Hito</option>
                <option value="viaje">Viaje</option>
                <option value="estudios">Estudios</option>
                <option value="trabajo">Trabajo</option>
                <option value="vida" selected>Vida</option>
                <option value="familia">Familia</option>
              </select>
            </div>

            <div class="form-group full">
              <label class="form-label" for="f-title">Título *</label>
              <input id="f-title" class="form-input" type="text" placeholder="¿Qué pasó?" required maxlength="100">
            </div>

            <div class="form-group full">
              <label class="form-label" for="f-desc">Descripción</label>
              <textarea id="f-desc" class="form-input" placeholder="Cuéntanos más..." rows="3"></textarea>
            </div>

            <div class="form-group full">
              <label class="form-label">Imágenes</label>
              <div id="form-existing-gallery"></div>
              <div id="form-dropzone" class="dropzone" role="button" tabindex="0"
                aria-label="Zona de subida de imágenes">
                <strong>Arrastra fotos aquí</strong> o haz clic para seleccionar<br>
                <small style="color:var(--text2)">JPG, PNG, WEBP · Múltiples archivos permitidos</small>
              </div>
              <div id="form-img-preview" class="upload-preview"></div>
              <small id="form-imgbb-note" style="color:var(--text2);font-size:.72rem;margin-top:.4rem;display:block">
                💡 Sin API key de ImgBB configurada: las imágenes se guardan como base64 localmente.
                <a href="https://api.imgbb.com/" target="_blank" rel="noopener"
                  style="color:var(--color-primary)">Obtener key gratuita →</a>
              </small>
            </div>

          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="form-cancel">Cancelar</button>
            <button type="submit" class="btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ══ LOGIN MODAL ══ -->
  <div id="modal-login" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
    <div class="modal-box" style="max-width: 380px;">
      <div class="modal-header">
        <h2 id="login-modal-title">Iniciar Sesión</h2>
        <button class="modal-close" id="modal-login-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <form id="form-login" novalidate>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label" for="l-email">Correo Electrónico</label>
            <input id="l-email" class="form-input" type="email" placeholder="amor@ejemplo.com" required>
          </div>
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label" for="l-password">Contraseña</label>
            <input id="l-password" class="form-input" type="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">Acceder</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ══ LIGHTBOX ══ -->
  <div id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Visor de imágenes">
    <button id="lb-close" aria-label="Cerrar">✕</button>
    <button class="lb-nav" id="lb-prev" aria-label="Anterior">‹</button>
    <img id="lb-img" src="" alt="Foto ampliada">
    <button class="lb-nav" id="lb-next" aria-label="Siguiente">›</button>
    <span id="lb-counter"></span>
  </div>

  <!-- ══ TOASTS ══ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ══ SCRIPTS ══ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/events.js"></script>
  <script src="assets/js/gallery.js"></script>
  <script src="assets/js/timeline.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    // FAB mobile
    document.getElementById('fab-add')?.addEventListener('click', () => {
      document.getElementById('btn-add-event')?.click();
    });
    // Cancel btn in form
    document.getElementById('form-cancel')?.addEventListener('click', () => {
      document.getElementById('modal-form-close')?.click();
    });
    // Horizontal drag scroll
    const h = document.getElementById('timeline-container');
    let isDown = false, startX, scrollLeft;
    h.addEventListener('mousedown', e => { isDown = true; startX = e.pageX - h.offsetLeft; scrollLeft = h.scrollLeft; });
    h.addEventListener('mouseleave', () => isDown = false);
    h.addEventListener('mouseup', () => isDown = false);
    h.addEventListener('mousemove', e => {
      if (!isDown) return; e.preventDefault();
      h.scrollLeft = scrollLeft - (e.pageX - h.offsetLeft - startX);
    });
    // Hamburger menu toggle
    const hamburger = document.getElementById('btn-hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger?.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', isOpen);
      mobileMenu.setAttribute('aria-hidden', !isOpen);
      hamburger.classList.toggle('active', isOpen);
    });
    // Close menu when clicking outside
    document.addEventListener('click', e => {
      if (!e.target.closest('#main-header') && mobileMenu.classList.contains('open')) {
        mobileMenu.classList.remove('open');
        hamburger?.setAttribute('aria-expanded', 'false');
        mobileMenu.setAttribute('aria-hidden', 'true');
        hamburger?.classList.remove('active');
      }
    });
    // Close menu on non-dropdown action clicks in mobile
    mobileMenu?.querySelectorAll('button:not(#btn-vertical):not(#btn-horizontal):not(.filter-dd-trigger), label').forEach(el => {
      el.addEventListener('click', () => {
        if (window.innerWidth < 1090 && !el.closest('.filter-dropdown')) {
          mobileMenu.classList.remove('open');
          hamburger?.setAttribute('aria-expanded', 'false');
          mobileMenu.setAttribute('aria-hidden', 'true');
          hamburger?.classList.remove('active');
        }
      });
    });
    // Filter dropdowns toggle
    const filterDropdowns = document.querySelectorAll('.filter-dropdown');
    filterDropdowns.forEach(dd => {
      const btn   = dd.querySelector('.filter-dd-trigger');
      const panel = dd.querySelector('.filter-dd-panel');
      btn?.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = panel.hasAttribute('hidden');
        // Cerrar todos los demás
        filterDropdowns.forEach(other => {
          if (other !== dd) {
            other.querySelector('.filter-dd-panel')?.setAttribute('hidden', '');
            other.querySelector('.filter-dd-trigger')?.setAttribute('aria-expanded', 'false');
            other.querySelector('.filter-dd-trigger')?.classList.remove('open');
          }
        });
        // Toggle este
        if (isOpen) {
          panel.removeAttribute('hidden');
          btn.setAttribute('aria-expanded', 'true');
          btn.classList.add('open');
        } else {
          panel.setAttribute('hidden', '');
          btn.setAttribute('aria-expanded', 'false');
          btn.classList.remove('open');
        }
      });
    });
    // Cerrar dropdowns al click fuera
    document.addEventListener('click', e => {
      if (!e.target.closest('.filter-dropdown')) {
        filterDropdowns.forEach(dd => {
          dd.querySelector('.filter-dd-panel')?.setAttribute('hidden', '');
          dd.querySelector('.filter-dd-trigger')?.setAttribute('aria-expanded', 'false');
          dd.querySelector('.filter-dd-trigger')?.classList.remove('open');
        });
      }
    });

    // Back to top
    const backTop = document.getElementById('btn-back-top');
    const getScrollTop = () => (document.scrollingElement || document.documentElement || document.body).scrollTop;
    const onScroll = () => backTop?.classList.toggle('visible', getScrollTop() > 300);
    window.addEventListener('scroll', onScroll, { passive: true });
    document.addEventListener('scroll', onScroll, { passive: true });
    backTop?.addEventListener('click', () => {
      (document.scrollingElement || document.documentElement || document.body).scrollTop = 0;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>

</html>
